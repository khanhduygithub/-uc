name: Split into 4 Parts

on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Extract zip
      run: |
        find . -name "*.zip" -exec unzip -o {} -d duckdz/ \;
    
    - name: Create ALL_CODE.txt
      run: |
        echo "=== ALL CODE ===" > ALL_CODE.txt
        find duckdz/ -type f \( -name "*.mm" -o -name "*.h" -o -name "*.m" -o -name "*.cpp" -o -name "*.c" -o -name "*.kt" -o -name "*.java" \) | sort | while read f; do
          echo "" >> ALL_CODE.txt
          echo "=== $f ===" >> ALL_CODE.txt
          cat "$f" >> ALL_CODE.txt
        done
    
    - name: Split into 4 parts
      run: |
        mkdir -p parts
        split -d -C 10M ALL_CODE.txt parts/part_
        echo "Parts created:"
        ls -lh parts/
    
    - name: Commit parts
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add parts/
        git commit -m "Add code parts" || echo "No changes"
        git push
