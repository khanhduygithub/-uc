name: Extract and Show on GitHub

on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug - List all files
      run: |
        echo "=== All files in repo ==="
        ls -la
        echo ""
        echo "=== Find zip files ==="
        find . -name "*.zip" -type f
    
    - name: Find and extract zip
      run: |
        ZIP=$(find . -name "*.zip" -type f | head -1)
        if [ -z "$ZIP" ]; then
          echo "ERROR: No zip file found!"
          exit 1
        fi
        echo "Extracting: $ZIP"
        unzip -o "$ZIP" -d ./
    
    - name: Commit extracted files
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Extracted files" || echo "No changes"
        git push
