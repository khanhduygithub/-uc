- name: Create ALL_CODE.txt
  run: |
    echo "=== ALL SOURCE CODE ===" > ALL_CODE.txt
    
    find duckdz/ -type f \( -name "*.kt" -o -name "*.java" -o -name "*.mm" -o -name "*.h" -o -name "*.m" -o -name "*.cpp" -o -name "*.c" -o -name "*.xml" -o -name "*.gradle" \) | sort | while read f; do
      echo "" >> ALL_CODE.txt
      echo "=== $f ===" >> ALL_CODE.txt
      cat "$f" >> ALL_CODE.txt 2>/dev/null || echo "[Binary]" >> ALL_CODE.txt
    done
